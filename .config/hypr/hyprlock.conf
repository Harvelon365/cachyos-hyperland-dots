# sample hyprlock.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock
#
# rendered text in all widgets supports pango markup (e.g. <b> or <i> tags)
# ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#general-remarks
#
# shortcuts to clear password buffer: ESC, Ctrl+U, Ctrl+Backspace
#
# you can get started by copying this config to ~/.config/hypr/hyprlock.conf
#

$font = Monospace
$monitor = DP-2

general {
    hide_cursor = true
}

# uncomment to enable fingerprint authentication
# auth {
#     fingerprint {
#         enabled = true
#         ready_message = Scan fingerprint to unlock
#         present_message = Scanning...
#         retry_delay = 250 # in milliseconds
#     }
# }

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
    animation = inputFieldColors, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 2
}

input-field {
    monitor = $monitor
    size = 20%, 5%
    outline_thickness = 0
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    # outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color = rgb(56, 56, 56)
    fail_color = rgb(210, 20, 4)
    swap_font_color = true

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    # rounding = 15

    font_family = $font
    font_size = 15
    placeholder_text = Input password...
    fail_text = $FAIL - $ATTEMPTS attempt(s)

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor = $monitor
    text = Hello $USER
    font_size = 20
    font_family = $font

    position = 0, 50
    halign = center
    valign = center
}

# TIME
label {
    monitor = $monitor
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 20
    font_family = $font

    position = 0, 280
    halign = center
    valign = center
}

# DATE
label {
    monitor = $monitor
    text = cmd[update:60000] date +"%A" # update every 60 seconds
    font_size = 20
    font_family = $font

    position = 0, 240
    halign = center
    valign = center
}

# DATE
label {
    monitor = $monitor
    text = cmd[update:60000] date +"%d %B %Y" | awk '{d=$1; m=$2; y=$3; if(d%10==1 && d!=11)s="st"; else if(d%10==2 && d!=12)s="nd"; else if(d%10==3 && d!=13)s="rd"; else s="th"; print d s, m, y}' # update every 60 seconds
    font_size = 20
    font_family = $font

    position = 0, 200
    halign = center
    valign = center
}