################
### MONITORS ###
################

monitor=DP-2,1920x1080@165,0x0,1,bitdepth,10
monitor=HDMI-A-1,1920x1080@60,1920x0,1
# FOR HOME SETUP, CHANGE 0x0 TO 1920x0 AND VICE VERSA

###################
### MY PROGRAMS ###
###################

$terminal = alacritty
$fileManager = thunar
$menu = rofi -show drun
$powermenu = rofi -show p -modi p:'~/.local/bin/rofi-power-menu --choices=lockscreen/suspend/logout/reboot/shutdown'
$calcmenu = rofi -show calc -modi calc -no-show-match -no-sort
$browser = zen-browser

#################
### AUTOSTART ###
#################

exec-once = $terminal
exec-once = waybar
exec-once = systemctl --user start hyprpolkitagent
exec-once = syncthing --no-browser
exec-once = shairport-sync
exec-once = hyprctl setcursor Posy_Cursor_Black 24
exec-once = systemctl start --user dunst

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = HYPRCURSOR_THEME,Posy_Cursor_Black
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRSHOT_DIR, /home/harvelon/Documents/Screenshots

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgb(1e90ff)
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = master
}

decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 0%
    animation = windowsOut,    1,     1.49,  quick,        slide bottom
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, slide
    animation = workspacesOut, 1,     1.94,  almostLinear, slide
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section belows
    preserve_split = true # You probably want this
    force_split = 2
}

master {
    new_status = slave
    mfact = 0.5
}

misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = true
}

#############
### INPUT ###
#############

input {
    kb_layout = gb
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 2

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Q, exec, $browser
bind = $mainMod, R, exec, $menu
#bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod CTRL, R, exec, killall waybar; waybar
bind = $mainMod, T, layoutmsg, swapsplit
bind = $mainMod, F, fullscreen

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special Controls
bind = CTRL SHIFT, F11, exec, bash -c "dunstify -t 2000 -r 9993 \"$(~/.config/sink-swapper.sh)\""
bind = $mainMod, L, exec, $powermenu
bind = $mainMod, C, exec, $calcmenu
bind = , PRINT, exec, hyprshot -m region --freeze

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod SHIFT, F, togglefloating

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, bash -c "wpctl set-mute @DEFAULT_AUDIO_SINK@ 0 && wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+ && sleep 0.05 && dunstify -t 2000 -r 9993 \"$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -o '[0-9.]*' | awk '{printf "Volume: %.0f%%\n", $1*100}')\""
bindel = ,XF86AudioLowerVolume, exec, bash -c "wpctl set-mute @DEFAULT_AUDIO_SINK@ 0 && wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%- && sleep 0.05 && dunstify -t 2000 -r 9993 \"$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -o '[0-9.]*' | awk '{printf "Volume: %.0f%%\n", $1*100}')\""
bindel = ,XF86AudioMute, exec, bash -c "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && sleep 0.05 && if wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -c 'MUTED'; then dunstify -t 2000 -r 9993 \"Volume: MUTED\"; else dunstify -t 2000 -r 9993 \"$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -o '[0-9.]*' | awk '{printf "Volume: %.0f%%\n", $1*100}')\"; fi"
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

workspace = 1,monitor:DP-2
workspace = 2,monitor:DP-2
workspace = 3,monitor:DP-2
workspace = 4,monitor:DP-2
workspace = 5,monitor:HDMI-A-1
workspace = 6,monitor:HDMI-A-1
workspace = 7,monitor:HDMI-A-1
workspace = 8,monitor:HDMI-A-1

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false

windowrule = workspace 5, match:class ^(zen)$
windowrule = opaque on, match:class ^(zen)$

# flameshot multi-display fix
windowrule = move 0 0, match:class (flameshot), match:title (flameshot)
windowrule = pin on, match:class (flameshot), match:title (flameshot)
windowrule = fullscreen_state 3 3, match:class (flameshot), match:title (flameshot)
windowrule = float on, match:class (flameshot), match:title (flameshot)

windowrule = float on, match:class ^(jetbrains-.*), match:title ^(win.*)
windowrule = no_initial_focus on, match:class ^(jetbrains-.*)

windowrule = float on, match:title ^(Picture-in-Picture.*)$
windowrule = pin on, match:title ^(Picture-in-Picture.*)$
windowrule = size 685 385, match:title ^(Picture-in-Picture.*)$

windowrule = stay_focused on, match:title ^()$,match:class ^(steam)$
windowrule = min_size 1 1, match:title ^()$,match:class ^(steam)$

debug {
    disable_logs = false
}
