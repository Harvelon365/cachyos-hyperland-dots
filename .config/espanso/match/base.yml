# espanso match file

# For a complete introduction, visit the official docs at: https://espanso.org/docs/

# You can use this file to define the base matches (aka snippets)
# that will be available in every application when using espanso.

# Matches are substitution rules: when you type the "trigger" string
# it gets replaced by the "replace" string.

# yaml-language-server: $schema=https://raw.githubusercontent.com/espanso/espanso/dev/schemas/match.schema.json

matches:
  # Simple text replacement
  # - trigger: ":espanso"
  #   replace: "Hi there!"

  # NOTE: espanso uses YAML to define matches, so pay attention to the indentation!

  # But matches can also be dynamic:

  # Print the current date
  - trigger: ":date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%d/%m/%Y"

  - trigger: "doesnt"
    replace: "doesn't"
    word: true
    propagate_case: true
  - trigger: "havent"
    replace: "haven't"
    word: true
    propagate_case: true
  - trigger: "cant"
    replace: "can't"
    word: true
    propagate_case: true
  - trigger: "wont"
    replace: "won't"
    word: true
    propagate_case: true
  - trigger: "dont"
    replace: "don't"
    word: true
    propagate_case: true
  - trigger: "shouldnt"
    replace: "shouldn't"
    word: true
    propagate_case: true
  - trigger: "thta"
    replace: "that"
    word: true
    propagate_case: true
  - trigger: "taht"
    replace: "that"
    word: true
    propagate_case: true
  - trigger: "thats"
    replace: "that's"
    word: true
    propagate_case: true
  - trigger: "teh"
    replace: "the"
    word: true
    propagate_case: true

  # Print the output of a shell command
  # - trigger: ":shell"
  #   replace: "{{output}}"
  #   vars:
  #     - name: output
  #       type: shell
  #       params:
  #         cmd: "echo 'Hello from your shell'"

  # And much more! For more information, visit the docs: https://espanso.org/docs/
